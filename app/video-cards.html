<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PITT Video Cards</title>
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; overflow: hidden; background: #071817; color: #eefaf6; font: 16px/1.35 Inter, ui-sans-serif, system-ui, sans-serif; }
      .card { width: 100vw; height: 100vh; display: grid; place-items: center; padding: 8vw; background: radial-gradient(circle at 72% 24%, #164f48 0, #0a2926 30%, #071817 68%); }
      .inner { width: min(1120px, 90vw); }
      .brand { display: flex; align-items: center; gap: 1rem; color: #80edc3; font-weight: 900; letter-spacing: .18em; }
      .mark { display: grid; place-items: center; width: 58px; height: 58px; border-radius: 16px; background: #80edc3; color: #071817; font-size: 2rem; }
      .eyebrow { margin: 3rem 0 1rem; color: #f1c77d; font-size: clamp(.9rem, 1.4vw, 1.3rem); font-weight: 800; letter-spacing: .14em; text-transform: uppercase; }
      h1 { max-width: 1000px; margin: 0; font-size: clamp(3.2rem, 7vw, 7rem); line-height: .98; letter-spacing: -.045em; }
      p { max-width: 900px; margin: 1.8rem 0 0; color: #bcd5ce; font-size: clamp(1.25rem, 2.1vw, 2rem); }
      .warning { color: #ffb6ae; }
      .pill { display: inline-block; margin-top: 2rem; border: 1px solid #80edc3; border-radius: 999px; padding: .7rem 1rem; color: #80edc3; font-weight: 800; }
    </style>
  </head>
  <body>
    <main class="card"><div class="inner"><div class="brand"><span class="mark">P</span><span>PITT</span></div><p class="eyebrow" id="eyebrow"></p><h1 id="title"></h1><p id="copy"></p><span class="pill" id="pill"></span></div></main>
    <script>
      const cards = {
        "intro-1": { eyebrow: "Trip Intelligence & Transit Triage", title: "Keep the trip visible.", copy: "Keep the driver in control.", pill: "Seeded local demonstration" },
        "intro-2": { eyebrow: "One delivery day · four decisions", title: "Traffic. Weather. Work zones. Fuel.", copy: "PITT turns changing conditions into reviewable choices without taking the wheel.", pill: "Built with Codex + GPT-5.6" },
        "codex-proof": { eyebrow: "Built with Codex + GPT-5.6", title: "Missing branch → working product.", copy: "27 unit tests · 4 browser outcomes · no credentials required", pill: "Driver review remains authoritative" },
        outro: { eyebrow: "Roundabout advisory", title: "PITT is aware of magic roundabouts.", copy: "For specimens like Swindon, UK: forecast carefully, keep the human in the loop, and maybe bring a wizard.", pill: "No autonomous sorcery" }
      };
      const selected = cards[new URLSearchParams(location.search).get("card")] ?? cards["intro-1"];
      document.querySelector("#eyebrow").textContent = selected.eyebrow;
      document.querySelector("#title").textContent = selected.title;
      document.querySelector("#copy").textContent = selected.copy;
      document.querySelector("#pill").textContent = selected.pill;
      if (selected === cards.outro) document.querySelector("#eyebrow").classList.add("warning");
    </script>
  </body>
</html>
